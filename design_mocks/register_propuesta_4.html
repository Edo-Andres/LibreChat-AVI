<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Propuesta 4 - Step by Step Dark</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { 
                        green: { 500: '#10a37f', 600: '#059669' },
                        dark: { 800: '#1e1e1e', 900: '#121212' }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .step-content { display: none; }
        .step-content.active { display: block; animation: slideIn 0.4s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body class="bg-black min-h-screen flex items-center justify-center p-4 font-sans">

    <!-- Background -->
    <div class="fixed inset-0 z-0">
        <div class="absolute top-0 left-0 w-full h-full bg-[url('./img_avi/bg_login.jpg')] bg-cover bg-center opacity-20"></div>
        <div class="absolute inset-0 bg-gradient-to-b from-black via-black/90 to-black"></div>
    </div>

    <div class="relative z-10 w-full max-w-2xl bg-dark-900/80 backdrop-blur-xl border border-white/10 rounded-3xl shadow-2xl overflow-hidden flex flex-col md:flex-row">
        
        <!-- Sidebar / Progress -->
        <div class="w-full md:w-1/3 bg-dark-800/50 p-8 border-r border-white/5 flex flex-col justify-between">
            <div>
                <div class="flex items-center space-x-3 mb-10">
                    <img src="./img_avi/ccm.png" class="h-8 w-8 object-contain">
                    <span class="text-white font-bold tracking-wide">CCM ID</span>
                </div>
                
                <div class="space-y-8 relative">
                    <!-- Vertical Line -->
                    <div class="absolute left-[15px] top-2 bottom-2 w-0.5 bg-white/10 -z-10"></div>
                    
                    <!-- Steps -->
                    <div class="step-indicator flex items-center space-x-4 group active" data-step="1">
                        <div class="w-8 h-8 rounded-full bg-green-500 text-white flex items-center justify-center text-sm font-bold shadow-[0_0_15px_rgba(16,163,127,0.5)] transition-all">1</div>
                        <div>
                            <p class="text-white text-sm font-medium">Identidad</p>
                            <p class="text-gray-500 text-xs">Datos básicos</p>
                        </div>
                    </div>
                    
                    <div class="step-indicator flex items-center space-x-4 group" data-step="2">
                        <div class="w-8 h-8 rounded-full bg-dark-800 border border-white/20 text-gray-400 flex items-center justify-center text-sm font-bold transition-all">2</div>
                        <div>
                            <p class="text-gray-400 text-sm font-medium group-[.active]:text-white">Académico</p>
                            <p class="text-gray-600 text-xs">Rol y área</p>
                        </div>
                    </div>
                    
                    <div class="step-indicator flex items-center space-x-4 group" data-step="3">
                        <div class="w-8 h-8 rounded-full bg-dark-800 border border-white/20 text-gray-400 flex items-center justify-center text-sm font-bold transition-all">3</div>
                        <div>
                            <p class="text-gray-400 text-sm font-medium group-[.active]:text-white">Acceso</p>
                            <p class="text-gray-600 text-xs">Credenciales</p>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="mt-10 text-xs text-gray-600">
                Paso <span id="current-step-num">1</span> de 3
            </div>
        </div>

        <!-- Form Area -->
        <div class="w-full md:w-2/3 p-8 md:p-10 bg-gradient-to-br from-white/5 to-transparent">
            <form id="registerForm" class="h-full flex flex-col justify-between">
                
                <!-- Step 1 -->
                <div class="step-content active" id="step1">
                    <h2 class="text-2xl font-bold text-white mb-6">¿Quién eres?</h2>
                    <div class="space-y-5">
                        <div class="space-y-1">
                            <label class="text-xs text-gray-400 uppercase tracking-wider">Nombre(s)</label>
                            <input type="text" class="w-full bg-dark-800 border border-white/10 rounded-xl px-4 py-3 text-white focus:border-green-500 focus:ring-1 focus:ring-green-500 outline-none transition-all" placeholder="Escribe tu nombre">
                        </div>
                        <div class="space-y-1">
                            <label class="text-xs text-gray-400 uppercase tracking-wider">Apellidos</label>
                            <input type="text" class="w-full bg-dark-800 border border-white/10 rounded-xl px-4 py-3 text-white focus:border-green-500 focus:ring-1 focus:ring-green-500 outline-none transition-all" placeholder="Escribe tus apellidos">
                        </div>
                        <div class="space-y-1">
                            <label class="text-xs text-gray-400 uppercase tracking-wider">Fecha de Nacimiento</label>
                            <input type="date" class="w-full bg-dark-800 border border-white/10 rounded-xl px-4 py-3 text-white focus:border-green-500 focus:ring-1 focus:ring-green-500 outline-none transition-all [color-scheme:dark]">
                        </div>
                    </div>
                </div>

                <!-- Step 2 -->
                <div class="step-content" id="step2">
                    <h2 class="text-2xl font-bold text-white mb-6">Perfil Académico</h2>
                    <div class="space-y-5">
                        <div class="space-y-1">
                            <label class="text-xs text-gray-400 uppercase tracking-wider">Correo Institucional</label>
                            <input type="email" class="w-full bg-dark-800 border border-white/10 rounded-xl px-4 py-3 text-white focus:border-green-500 focus:ring-1 focus:ring-green-500 outline-none transition-all" placeholder="usuario@ccm.edu">
                        </div>
                        <div class="space-y-1">
                            <label class="text-xs text-gray-400 uppercase tracking-wider">Rol Principal</label>
                            <div class="grid grid-cols-2 gap-3">
                                <label class="cursor-pointer">
                                    <input type="radio" name="role" class="peer sr-only">
                                    <div class="rounded-xl border border-white/10 bg-dark-800 p-4 text-center hover:bg-white/5 peer-checked:border-green-500 peer-checked:bg-green-500/10 transition-all">
                                        <span class="text-white text-sm">Estudiante</span>
                                    </div>
                                </label>
                                <label class="cursor-pointer">
                                    <input type="radio" name="role" class="peer sr-only">
                                    <div class="rounded-xl border border-white/10 bg-dark-800 p-4 text-center hover:bg-white/5 peer-checked:border-green-500 peer-checked:bg-green-500/10 transition-all">
                                        <span class="text-white text-sm">Profesor</span>
                                    </div>
                                </label>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Step 3 -->
                <div class="step-content" id="step3">
                    <h2 class="text-2xl font-bold text-white mb-6">Seguridad</h2>
                    <div class="space-y-5">
                        <div class="space-y-1">
                            <label class="text-xs text-gray-400 uppercase tracking-wider">Contraseña</label>
                            <input type="password" class="w-full bg-dark-800 border border-white/10 rounded-xl px-4 py-3 text-white focus:border-green-500 focus:ring-1 focus:ring-green-500 outline-none transition-all" placeholder="••••••••">
                        </div>
                        <div class="space-y-1">
                            <label class="text-xs text-gray-400 uppercase tracking-wider">Confirmar Contraseña</label>
                            <input type="password" class="w-full bg-dark-800 border border-white/10 rounded-xl px-4 py-3 text-white focus:border-green-500 focus:ring-1 focus:ring-green-500 outline-none transition-all" placeholder="••••••••">
                        </div>
                        <div class="pt-2">
                            <label class="flex items-start cursor-pointer group">
                                <div class="relative flex items-center">
                                    <input type="checkbox" class="peer sr-only">
                                    <div class="w-5 h-5 border-2 border-gray-500 rounded peer-checked:bg-green-500 peer-checked:border-green-500 transition-all"></div>
                                    <svg class="absolute w-3 h-3 text-white left-1 opacity-0 peer-checked:opacity-100 transition-opacity" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                                </div>
                                <span class="ml-3 text-sm text-gray-400 group-hover:text-gray-300 transition-colors">Acepto los términos y condiciones</span>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Navigation Buttons -->
                <div class="mt-8 flex justify-between items-center pt-6 border-t border-white/5">
                    <button type="button" id="prevBtn" onclick="changeStep(-1)" class="text-gray-400 hover:text-white text-sm font-medium px-4 py-2 rounded-lg hover:bg-white/5 transition-all hidden">
                        Atrás
                    </button>
                    <button type="button" id="nextBtn" onclick="changeStep(1)" class="ml-auto bg-green-600 hover:bg-green-500 text-white text-sm font-bold px-8 py-3 rounded-xl shadow-lg shadow-green-900/20 transition-all transform hover:scale-105">
                        Continuar
                    </button>
                </div>

            </form>
        </div>
    </div>

    <script>
        let currentStep = 1;
        const totalSteps = 3;

        function changeStep(direction) {
            const newStep = currentStep + direction;
            if (newStep < 1 || newStep > totalSteps) return;

            // Hide current
            document.getElementById(`step${currentStep}`).classList.remove('active');
            
            // Show new
            document.getElementById(`step${newStep}`).classList.add('active');
            
            currentStep = newStep;
            updateUI();
        }

        function updateUI() {
            // Update Step Number
            document.getElementById('current-step-num').innerText = currentStep;

            // Update Sidebar Indicators
            document.querySelectorAll('.step-indicator').forEach((el, idx) => {
                const stepNum = idx + 1;
                const circle = el.querySelector('div:first-child');
                const text = el.querySelector('div:last-child p:first-child');

                if (stepNum === currentStep) {
                    circle.className = "w-8 h-8 rounded-full bg-green-500 text-white flex items-center justify-center text-sm font-bold shadow-[0_0_15px_rgba(16,163,127,0.5)] transition-all";
                    text.classList.add('text-white');
                    text.classList.remove('text-gray-400');
                } else if (stepNum < currentStep) {
                    circle.className = "w-8 h-8 rounded-full bg-green-900/50 text-green-400 border border-green-500/30 flex items-center justify-center text-sm font-bold transition-all";
                    circle.innerHTML = "✓";
                    text.classList.remove('text-white');
                    text.classList.add('text-gray-400');
                } else {
                    circle.className = "w-8 h-8 rounded-full bg-dark-800 border border-white/20 text-gray-400 flex items-center justify-center text-sm font-bold transition-all";
                    circle.innerHTML = stepNum;
                    text.classList.remove('text-white');
                    text.classList.add('text-gray-400');
                }
            });

            // Update Buttons
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');

            if (currentStep === 1) {
                prevBtn.classList.add('hidden');
            } else {
                prevBtn.classList.remove('hidden');
            }

            if (currentStep === totalSteps) {
                nextBtn.innerText = "Crear Cuenta";
                nextBtn.classList.remove('bg-green-600', 'hover:bg-green-500');
                nextBtn.classList.add('bg-white', 'text-black', 'hover:bg-gray-200');
            } else {
                nextBtn.innerText = "Continuar";
                nextBtn.classList.add('bg-green-600', 'hover:bg-green-500');
                nextBtn.classList.remove('bg-white', 'text-black', 'hover:bg-gray-200');
            }
        }
    </script>
</body>
</html>
